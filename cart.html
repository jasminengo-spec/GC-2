<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8">
        <title> Cart - Triforma PH</title>
    </head>
    <body>
    <header>
        <nav>
            <a href=index.html>Home</a> |
            <a href=catalogue.html>Products</a> |
            <a href=cart.html><span class="active">Cart</span></a> |
            <a href=checkout.html>Checkout</a>
        </nav>
    </header>
        <h2>Your Cart</h2>
        

            <!-- Cart items will go here -->
              <!-- im ngl i dont understand this -->
            <div id="cart-items"></div>

        <script>
        // Display cart items from localStorage
        function renderCartItems() {
            const cartContainer = document.getElementById('cart-items');
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length === 0) {
                cartContainer.innerHTML = '<p>Your cart is currently empty. Browse our catalogue to add some amazing 3D printed products!</p>';
                return;
            }
            let html = '<ul style="list-style:none;padding:0;">';
            cart.forEach(item => {
                html += `
                <li style="margin-bottom:20px;border-bottom:1px solid #ccc;padding-bottom:10px;">
                    <img src="${item.image}" alt="${item.title}" style="width:100px;vertical-align:middle;margin-right:10px;">
                    <strong>${item.title}</strong><br>
                    <span>${item.price}</span><br>
                    <span>${item.description}</span>
                </li>
                `;
            });
            html += '</ul>';
            cartContainer.innerHTML = html;
        }
        document.addEventListener('DOMContentLoaded', renderCartItems);
        </script>

            <br>

            <a href="catalogue.html">Continue Shopping</a>
            <br><br>
            <a href="checkout.html">Proceed to Checkout</a>

            <script src="product.js"></script>

</body>

    </body>
